<div class="generator-container">

  <div class="settings">
    <label for="length">Оберіть довжину (8-32):</label>
    <input id="length" type="number" [(ngModel)]="passwordLength" min="8" max="32"class="length-input">
  </div>

  <button (click)="onGenerate()" [disabled]="isLoading">
    {{ isLoading ? 'Генерується...' : 'Згенерувати пароль' }}
  </button>

  <div *ngIf="errorMsg" class="error">
    {{ errorMsg }}
  </div>

  <div class="result-box" *ngIf="generatedPassword">
    <p>Ваш новий пароль:</p>
    <strong class="password-text">{{ generatedPassword }}</strong>
    <button (click)="copyToClipboard()" [class.copied]="isCopied" class="copy-btn" title="Копіювати">
      {{ isCopied ? 'Скопійовано!' : 'Копіювати' }}
    </button>
  </div>
</div>
